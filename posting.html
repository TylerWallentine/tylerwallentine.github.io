<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Editor</title>
    
    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    
    <!-- Your custom files -->
     <script type="module" src="j-firebase.js"></script>
    <link rel="stylesheet" href="s-posting.css">
</head>
<body>
    <div class="editor-container">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)">
                    <strong>B</strong>
                </button>
                <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)">
                    <em>I</em>
                </button>
                <button class="toolbar-btn" data-action="underline" title="Underline (Ctrl+U)">
                    <u>U</u>
                </button>
            </div>
            
            <div class="toolbar-group">
                <select class="font-family" title="Font Family">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Helvetica">Helvetica</option>
                </select>
                
                <input type="color" class="color-picker" title="Text Color" value="#000000">
            </div>
            
            <div class="toolbar-group">
                <button class="toolbar-btn" data-action="bulletList" title="Bullet List">
                    • List
                </button>
                <button class="toolbar-btn" data-action="numberedList" title="Numbered List">
                    1. List
                </button>
            </div>
            
            <div class="toolbar-group">
                <button class="toolbar-btn" data-action="link" title="Insert Link">
                    🔗 Link
                </button>
                <button class="toolbar-btn" data-action="image" title="Upload Image">
                    📷 Image
                </button>
            </div>
            
            <div class="toolbar-group">
                <button class="toolbar-btn" data-action="markdown" title="Toggle Markdown Mode">
                    MD
                </button>
                <button class="toolbar-btn" data-action="latex" title="Insert LaTeX">
                    ∑ LaTeX
                </button>
            </div>
            
            <div class="toolbar-group">
                <button class="toolbar-btn" data-action="preview" title="Toggle Preview">
                    👁 Preview
                </button>
                <button class="toolbar-btn" data-action="export" title="Export Content">
                    💾 Export
                </button>
            </div>
        </div>
        
        <!-- Editor Area -->
        <div class="editor-wrapper">
            <div class="editor-content" contenteditable="true" id="editor" 
                 placeholder="Start writing... You can paste images directly with Ctrl+V!">
            </div>
            
            <div class="preview-content" id="preview" style="display: none;">
                <!-- Preview content will be rendered here -->
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="word-count">Words: 0</span>
            <span class="char-count">Characters: 0</span>
            <span class="mode-indicator">Rich Text Mode</span>
        </div>
    </div>
    
    <!-- Hidden file input for image uploads -->
    <input type="file" id="imageUpload" accept="image/*" style="display: none;" multiple>
    
    <!-- Link Modal -->
    <div class="modal" id="linkModal">
        <div class="modal-content">
            <h3>Insert Link</h3>
            <input type="text" id="linkText" placeholder="Link text">
            <input type="url" id="linkUrl" placeholder="https://example.com">
            <div class="modal-buttons">
                <button id="insertLink">Insert</button>
                <button id="cancelLink">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- LaTeX Modal -->
    <div class="modal" id="latexModal">
        <div class="modal-content">
            <h3>Insert LaTeX</h3>
            <textarea id="latexInput" placeholder="Enter LaTeX expression (e.g., x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a})"></textarea>
            <div class="latex-preview" id="latexPreview"></div>
            <div class="modal-buttons">
                <button id="insertLatex">Insert</button>
                <button id="cancelLatex">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Load your JavaScript -->
    <script src="j-posting.js"></script>
</body>
</html>
