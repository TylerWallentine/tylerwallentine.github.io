<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modern.css">
    <link rel="stylesheet" href="newsletter.css">
    <link rel="preload" as="image" href="images/rains-header.webp">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="j-firebase.js"></script>
    <script src="j-modules.js"></script>
    <script src="functions/newsletter.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Header bar + nav are inlined in the HTML (no fetch) to avoid
            // layout jitter and stay identical across pages.
            await ModuleLoader.loadMultipleModules([]);
            
            // Any page-specific JavaScript after modules load
            initializePageSpecificFeatures();
        });
        
        function initializePageSpecificFeatures() {
            // Add event listeners, initialize components, etc.
            console.log('Main page modules loaded and initialized');
        }
    </script>

</head>
<body>
    <div id="account-bar">
        <header class="account-bar">
            <a href="/" aria-label="Home">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
            </a>
            <a href="/login" class="account">Log In / Sign Up</a>
        </header>
    </div>
    <header class="hero-small">
        <div class="hero-small-content">
            <h1>About Me</h1>
        </div>
    </header>
    <div id="small-grid-container">
        <nav class="grid-container-small">
            <a href="/about" class="grid-item-small">About Me</a>
            <a href="/projects" class="grid-item-small">Projects</a>
            <a href="/blog" class="grid-item-small">Blog</a>
            <a href="/contact" class="grid-item-small">Contact</a>
        </nav>
    </div>

    <main id="aboutme-container">
        <article id="aboutme-content">
            <p>Loading About Me content...</p>
        </article>
        <button id="edit-aboutme-btn" style="display:none;">✏️ Edit About Me</button>
        <div id="aboutme-editor" style="display:none;">
            <div id="aboutme-editor-area" contenteditable="true"></div>
            <div class="aboutme-editor-buttons">
                <button id="save-aboutme-btn">💾 Save</button>
                <button id="cancel-aboutme-btn">Cancel</button>
            </div>
        </div>
    </main>

    <script>
        // Load the "About Me" content from Firestore (pages/about-me) and,
        // for the admin, allow inline editing that saves straight back to Firestore.
        document.addEventListener("DOMContentLoaded", () => {
            const ADMIN_EMAIL = "wallentinetyler@gmail.com";

            const contentEl = document.getElementById("aboutme-content");
            const editBtn   = document.getElementById("edit-aboutme-btn");
            const editorBox = document.getElementById("aboutme-editor");
            const editArea  = document.getElementById("aboutme-editor-area");
            const saveBtn   = document.getElementById("save-aboutme-btn");
            const cancelBtn = document.getElementById("cancel-aboutme-btn");

            const aboutRef = () =>
                window.fsDoc(window.firestoreDb, "pages", "about-me");

            async function loadAboutMe() {
                try {
                    const snap = await window.fsGetDoc(aboutRef());
                    if (snap.exists() && snap.data().content) {
                        contentEl.innerHTML = snap.data().content;
                    } else {
                        contentEl.innerHTML = "<p>No About Me content found yet.</p>";
                    }
                } catch (err) {
                    console.error("Error loading About Me:", err);
                    contentEl.innerHTML =
                        "<p><em>Couldn't load About Me content: " +
                        (err.code || err.message || err) + "</em></p>";
                }
            }

            // Wait until the firebase globals from j-firebase.js are ready.
            function whenFirebaseReady(cb) {
                if (window.firestoreDb && window.fsDoc && window.fsGetDoc) {
                    cb();
                } else {
                    setTimeout(() => whenFirebaseReady(cb), 200);
                }
            }

            whenFirebaseReady(() => {
                loadAboutMe();

                // Show the edit button only for the admin account.
                const auth = window.firebaseAuth;
                if (auth && auth.onAuthStateChanged) {
                    auth.onAuthStateChanged((user) => {
                        editBtn.style.display =
                            user && user.email === ADMIN_EMAIL ? "block" : "none";
                    });
                }
            });

            // ---- Inline editing (admin only) ----
            editBtn.addEventListener("click", () => {
                editArea.innerHTML = contentEl.innerHTML;
                contentEl.style.display = "none";
                editBtn.style.display = "none";
                editorBox.style.display = "block";
            });

            cancelBtn.addEventListener("click", () => {
                editorBox.style.display = "none";
                contentEl.style.display = "";
                editBtn.style.display = "block";
            });

            saveBtn.addEventListener("click", async () => {
                const newContent = editArea.innerHTML;
                saveBtn.disabled = true;
                saveBtn.textContent = "Saving…";
                try {
                    // setDoc-style upsert via updateDoc, falling back to addDoc-less
                    // create if the doc doesn't exist yet.
                    const ref = aboutRef();
                    const snap = await window.fsGetDoc(ref);
                    if (snap.exists()) {
                        await window.fsUpdateDoc(ref, {
                            content: newContent,
                            updatedAt: new Date()
                        });
                    } else {
                        // No global setDoc is exposed, so import it on demand.
                        const { setDoc } = await import(
                            "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
                        );
                        await setDoc(ref, {
                            content: newContent,
                            updatedAt: new Date()
                        });
                    }
                    contentEl.innerHTML = newContent;
                    editorBox.style.display = "none";
                    contentEl.style.display = "";
                    editBtn.style.display = "block";
                } catch (err) {
                    console.error("Error saving About Me:", err);
                    alert("Failed to save: " + (err.code || err.message || err));
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = "💾 Save";
                }
            });
        });
    </script>

</body>

</html>
