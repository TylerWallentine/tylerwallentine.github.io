<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modern.css">
    <link rel="stylesheet" href="newsletter.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="preload" as="image" href="images/rains-header.webp">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="j-firebase.js"></script>
    <script src="j-modules.js"></script>
    <script src="functions/newsletter.js"></script>
    <script src="functions/contact.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Header bar + nav are inlined in the HTML (no fetch) to avoid
            // layout jitter and stay identical across pages.
            await ModuleLoader.loadMultipleModules([]);
            
            // Any page-specific JavaScript after modules load
            initializePageSpecificFeatures();
        });
        
        function initializePageSpecificFeatures() {
            // Add event listeners, initialize components, etc.
            console.log('Main page modules loaded and initialized');
        }
    </script>

</head>
<body>
    <div id="account-bar">
        <header class="account-bar">
            <a href="/" aria-label="Home">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
            </a>
            <a href="/login" class="account">Log In / Sign Up</a>
        </header>
    </div>
    <header class="hero-small">
        <div class="hero-small-content">
            <h1>Contact</h1>
        </div>
    </header>
    <div id="small-grid-container">
        <nav class="grid-container-small">
            <a href="/about" class="grid-item-small">About Me</a>
            <a href="/projects" class="grid-item-small">Projects</a>
            <a href="/blog" class="grid-item-small">Blog</a>
            <a href="/contact" class="grid-item-small">Contact</a>
        </nav>
    </div>

    <section class="contact-section">
        <h2 class="contact-heading">Get in touch</h2>
        <p class="contact-intro">
            Have a question, an idea, or just want to say hello? Send me a message
            and I'll get back to you.
        </p>

        <form id="contact-form" class="contact-form" novalidate>
            <div class="cf-row">
                <div class="cf-field">
                    <label for="cf-name">Name</label>
                    <input type="text" id="cf-name" name="name" autocomplete="name" required>
                </div>
                <div class="cf-field">
                    <label for="cf-email">Email</label>
                    <input type="email" id="cf-email" name="email" autocomplete="email" required>
                </div>
            </div>

            <div class="cf-field">
                <label for="cf-subject">Subject</label>
                <input type="text" id="cf-subject" name="subject">
            </div>

            <div class="cf-field">
                <label for="cf-message">Message</label>
                <textarea id="cf-message" name="message" required></textarea>
            </div>

            <!-- Honeypot: hidden from humans, traps bots -->
            <div class="cf-hp" aria-hidden="true">
                <label>Leave this empty<input type="text" name="_gotcha" tabindex="-1" autocomplete="off"></label>
            </div>

            <button type="submit" class="cf-submit">Send message</button>
            <p class="cf-message" role="status" aria-live="polite"></p>
        </form>
    </section>
</body>

</html>
