<div class="profile-box">
    <h1>Profile</h1>
    
    <div class="profile-content">
        <div class="profile-field">
            <span class="field-label">Name:</span>
            <span class="field-value profile-name">Loading...</span>
        </div>

        <div class="profile-field">
            <span class="field-label">Alias:</span>
            <span class="field-value profile-alias">Loading...</span>
        </div>
        
        <div class="profile-field">
            <span class="field-label">Location:</span>
            <span class="field-value profile-location">Loading...</span>
        </div>
        
        <div class="profile-field">
            <span class="field-label">Role:</span>
            <span class="field-value profile-role">Loading...</span>
        </div>
        
        <div class="profile-field">
            <span class="field-label">Member Since:</span>
            <span class="field-value profile-join-date">Loading...</span>
        </div>

        <div class="profile-field">
            <span class="field-label">No. Posts:</span>
            <span class="field-value profile-no-posts">Loading...</span>
        </div>

        <div class="profile-field">
            <span class="field-label">Newsletter:</span>
            <span class="field-value profile-subscription">Loading...</span>
            <button class="subscription-btn" id="subscription-btn" style="display:none;"></button>
        </div>
    </div>
    
    <div class="profile-actions">
    <button class="edit-profile-btn" onclick="toggleEditMode()">Edit Profile</button>
    <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
</div>
