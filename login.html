<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-tablet.css">
    <link rel="stylesheet" href="styles-phone.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style> body {background: linear-gradient(to bottom, white 0%, #1a4d3a 100%); margin: 0;}</style>

    <script type="module" src="j-firebase.js"></script>
    <script type="module" src="functions/login.js"></script>
    <script type="module" src="functions/logout.js"></script>

    <script src="j-modules.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await ModuleLoader.loadMultipleModules([
                { 
                    path: 'modules/account-bar.html', 
                    target: '#account-bar',
                    authCallback: window.updateAccountBar  // This updates based on auth state
                },
                {path: 'modules/login-box.html', target: '#login-box'},
                {path: 'modules/hero-side.html', target: '#hero-side'}
            ]);
            
            // Any page-specific JavaScript after modules load
            initializePageSpecificFeatures();
        });
        
        function initializePageSpecificFeatures() {
            // Add event listeners, initialize components, etc.
            console.log('Main page modules loaded and initialized');
        }
    </script>
</head>
<body>
    <div id="account-bar"></div>
    <div id="hero-side"></div>
    <div id="login-box"></div>
    <!-- Your existing head content -->



        

</body>
</html>
