<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-tablet.css">
    <link rel="stylesheet" href="styles-phone.css">
    <link rel="stylesheet" href="newsletter.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {background: linear-gradient(to bottom, white 0%, #1a4d3a 100%); margin: 0;}
        /* Admin account dropdown (self-contained; the .account-bar is already
           position:fixed, so it anchors this absolutely-positioned menu). */
        .account-menu {
            position: absolute;
            top: 100%;
            right: 12px;
            min-width: 180px;
            background: #fff;
            border: 1px solid #e5e7e7;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            display: none;
            z-index: 20;
        }
        .account-menu.open { display: block; }
        .account-menu-item {
            display: block;
            padding: 10px 16px;
            color: #022d33;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .account-menu-item:hover { background: #f2f6f6; }
    </style>
    <title>Profile - Vapor Rain</title>
    <script type="module" src="j-firebase.js"></script>
    <script type="module" src="functions/login.js"></script>
    <script type="module" src="functions/logout.js"></script>
    <script type="module" src="functions/profile-edit.js"></script>
    <script src="j-modules.js"></script>
    <script src="functions/newsletter.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await ModuleLoader.loadMultipleModules([
                { 
                    path: 'modules/account-bar.html', 
                    target: '#account-bar',
                    authCallback: window.updateAccountBar
                },
                {path: 'modules/profile-box.html', target: '#profile-box'}
            ]);
            
            initializePageSpecificFeatures();
        });

        function initializePageSpecificFeatures() {
            console.log('Profile page modules loaded and initialized');
            
            // Wait for Firebase auth to be ready, then populate profile
            if (window.firebaseAuth) {
                populateUserProfile();
            } else {
                // If Firebase isn't ready yet, wait a bit
                setTimeout(() => {
                    if (window.firebaseAuth) {
                        populateUserProfile();
                    }
                }, 1000);
            }
        }

        async function populateUserProfile() {
            // Import the auth state listener from your firebase module
            const auth = window.firebaseAuth;
            const { onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");

            onAuthStateChanged(auth, async (user) => {

                if (user) {
                    console.log('Populating profile for user:', user.email);
                    
                    try {
                        // Read the user's own profile by uid (works under isSelf rules;
                        // an email query would be denied for non-editors).
                        const userProfile = await window.getUserProfileById(user.uid);
                        
                        if (userProfile) {
                            updateProfileFields(userProfile, user);
                            loadSubscription(user);
                        } else {
                            console.log('No user profile found in Firestore');
                            showProfileError('Profile data not found');
                        }
                    } catch (error) {
                        console.error('Error loading profile:', error);
                        showProfileError('Error loading profile data');
                    }
                } else {
                    // User not logged in - redirect to login
                    console.log('User not logged in, redirecting...');
                    window.location.href = '/login';
                }
            });
        }

        function updateProfileFields(userProfile, user) {
            // Build full name
            const firstName = userProfile.firstName || '';
            const middleInitial = userProfile.middleInitial ? `${userProfile.middleInitial}.` : '';
            const lastName = userProfile.lastName || '';
            const fullName = `${firstName} ${middleInitial} ${lastName}`.trim() || 'Not provided';

            let noPosts = 0;
            if (userProfile.posts) {
                if (typeof userProfile.posts === 'number') {
                    noPosts = userProfile.posts; // If it's already a number
                } else if (Array.isArray(userProfile.posts)) {
                    noPosts = userProfile.posts.length; // If it's an array, get the length
                } else {
                    noPosts = 0; // Default fallback
        }
            }
            // Format join date
            let joinDate = 'Not available';
            if (userProfile.joinDate) {
                if (userProfile.joinDate.seconds) {
                    // Firestore timestamp
                    joinDate = new Date(userProfile.joinDate.seconds * 1000).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } else if (userProfile.joinDate instanceof Date) {
                    // Regular date
                    joinDate = userProfile.joinDate.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                }
            }
            
            // Update profile fields
            updateField('.profile-name', fullName);
            updateField('.profile-location', userProfile.location || 'Not provided');
            updateField('.profile-role', userProfile.role || 'Member');
            updateField('.profile-join-date', joinDate);
            updateField('.profile-no-posts', noPosts)
            // If you have an alias field in your HTML, update it too
            updateField('.profile-alias', userProfile.alias || fullName || 'Not provided');
            
            console.log('Profile fields updated successfully');
        }

        function updateField(selector, value) {
            const element = document.querySelector(selector);
            if (element) {
                element.textContent = value;
                element.classList.remove('loading'); // Remove loading class if present
            } else {
                console.warn(`Element not found: ${selector}`);
            }
        }

        function showProfileError(message) {
            const profileContent = document.querySelector('.profile-content');
            if (profileContent) {
                profileContent.innerHTML = `
                    <div class="error-message" style="text-align: center; color: #d32f2f; padding: 20px;">
                        <h3>Error Loading Profile</h3>
                        <p>${message}</p>
                        <button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px; background: #022d33; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        // ============================================================
        //  Newsletter subscription management (from the profile page)
        // ============================================================
        let currentSubscription = null; // { id, email, active, linkedaccount }
        let currentSubUser = null;

        async function loadSubscription(user) {
            currentSubUser = user;
            const valueEl = document.querySelector('.profile-subscription');
            const btn = document.getElementById('subscription-btn');
            if (!valueEl || !btn) return;

            const db = window.firestoreDb;
            const email = (user.email || '').toLowerCase();
            if (!db || !email) { valueEl.textContent = 'Unavailable'; return; }

            try {
                // Find any subscriber doc tied to this email (rules allow the
                // owner to read their own by matching token email).
                const q = window.fsQuery(
                    window.fsCollection(db, 'subscribers'),
                    window.fsWhere('email', '==', email)
                );
                const qs = await window.fsGetDocs(q);
                currentSubscription = qs.empty
                    ? null
                    : { id: qs.docs[0].id, ...qs.docs[0].data() };

                // Link the subscription to this account if it isn't already.
                if (currentSubscription &&
                    currentSubscription.linkedaccount !== user.uid) {
                    try {
                        await window.fsUpdateDoc(
                            window.fsDoc(db, 'subscribers', currentSubscription.id),
                            { linkedaccount: user.uid }
                        );
                        currentSubscription.linkedaccount = user.uid;
                    } catch (e) { /* non-fatal */ }
                }
            } catch (e) {
                console.warn('Could not load subscription:', e);
            }

            renderSubscription();
        }

        function renderSubscription() {
            const valueEl = document.querySelector('.profile-subscription');
            const btn = document.getElementById('subscription-btn');
            if (!valueEl || !btn) return;
            valueEl.classList.remove('loading');

            // Prefer the explicit status; fall back to the legacy `active` bool.
            const st = currentSubscription
                ? (currentSubscription.status ||
                   ((currentSubscription.active !== false && currentSubscription.active !== 0)
                     ? 'active' : 'inactive'))
                : null;

            if (!currentSubscription) {
                valueEl.textContent = 'Not subscribed';
                btn.textContent = 'Subscribe';
                btn.dataset.action = 'subscribe';
            } else if (st === 'active') {
                valueEl.textContent = 'Active';
                btn.textContent = 'Deactivate';
                btn.dataset.action = 'deactivate';
            } else if (st === 'pending') {
                valueEl.textContent = 'Awaiting opt-in (check your email)';
                btn.textContent = 'Resend opt-in email';
                btn.dataset.action = 'resubscribe';
            } else {
                valueEl.textContent = 'Inactive';
                btn.textContent = 'Resubscribe';
                btn.dataset.action = 'resubscribe';
            }
            btn.style.display = '';
        }

        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('#subscription-btn');
            if (!btn || !currentSubUser) return;
            const action = btn.dataset.action;
            const db = window.firestoreDb;
            const email = (currentSubUser.email || '').toLowerCase();
            btn.disabled = true;
            try {
                // All Zoho-touching actions go through the Cloud Functions
                // (via Newsletter), which keep Zoho + Firestore in sync.
                if (action === 'subscribe' || action === 'resubscribe') {
                    await window.Newsletter.subscribe(email, 'profile');
                } else if (action === 'deactivate') {
                    await window.Newsletter.unsubscribe(email);
                }
                await loadSubscription(currentSubUser);
            } catch (err) {
                console.error('Subscription action failed:', err);
                alert('Could not update subscription. Please try again.');
            } finally {
                btn.disabled = false;
            }
        });

        // Make functions globally available for debugging
        window.populateUserProfile = populateUserProfile;
        window.updateProfileFields = updateProfileFields;
        window.loadSubscription = loadSubscription;
</script>
</head>
<body data-newsletter-no-popup>
    <div id="account-bar"></div>
    <header class="hero_side"><div class="hero-content"><h2>Account Center</h2></div></header>
    <div id="profile-box"></div>
        

</body>
</html>
