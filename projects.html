<script>
    document.addEventListener("DOMContentLoaded", async () => {
  const auth = window.firebaseAuth;

  if (!auth) return;

  auth.onAuthStateChanged(async (user) => {
    if (user && user.email === "wallentinetyler@gmail.com") {
      const container = document.getElementById("new-project-btn-container");

      if (container) {
        const btn = document.createElement("button");
        btn.textContent = "+ New Project";
        btn.className = "new-project-btn";
        
        btn.addEventListener("click", async () => {
          try {
            const db = window.firestoreDb;
            const projectsRef = window.fsCollection(db, "projects");

            const docRef = await window.fsAddDoc(projectsRef, {
              title: "Untitled Project",
              createdAt: new Date(),
              owner: user.uid,
              published: false,
              featured: false,
              tags: [],
              excerpt: "",
            });

            // Redirect to the editor with new project ID
            window.location.href = `/project-editor?id=${docRef.id}`;
          } catch (err) {
            console.error("Error creating new project:", err);
            alert("Failed to create new project: " + (err.code || err.message || err));
          }
        });

        container.appendChild(btn);
      }
    }
  });
});

</script>

      <!--<p id="modal-project-excerpt"></p>-->
      <!--<img id="modal-project-image" class="featured-project-image" alt="">-->
      <div id="modal-project-phases" class="project-phases-scroll"></div>
    </div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
  const modal = document.getElementById("project-modal");
  const closeBtn = document.getElementById("close-project-modal");

  const titleEl = document.getElementById("modal-project-title");
  // const excerptEl = document.getElementById("modal-project-excerpt");
  // const imageEl = document.getElementById("modal-project-image");
  const phasesContainer = document.getElementById("modal-project-phases");
  const editBtn = document.getElementById("edit-project-btn");

  // Is the signed-in user allowed to edit? (admin email OR role "editor")
  async function isCurrentUserEditor() {
    const user = window.firebaseAuth?.currentUser;
    if (!user) return false;
    if (user.email === "wallentinetyler@gmail.com") return true;
    try {
      const snap = await window.fsGetDoc(window.fsDoc(window.firestoreDb, "users", user.uid));
      return snap.exists() && (snap.data().role || "").toLowerCase() === "editor";
    } catch (e) {
      console.warn("Editor check failed:", e);
      return false;
    }
  }

  // Re-open the currently viewed project in the editor
  editBtn.addEventListener("click", () => {
    const id = modal.dataset.projectId;
    if (id) window.location.href = `/project-editor?id=${encodeURIComponent(id)}`;
  });

  // 🔹 Handle "Read More" clicks
  document.body.addEventListener("click", async (e) => {
    if (e.target.classList.contains("read-more-btn")) {
      const projectId = e.target.dataset.projectId;
      if (!projectId) return; // ignore buttons without a project id (e.g. Edit)
      await openProjectModal(projectId);
    }
  });

  // 🔹 Close modal
  closeBtn.addEventListener("click", () => setProjectModalOpen(false));

  window.addEventListener("click", (e) => {
    if (e.target === modal) setProjectModalOpen(false);
  });

  function setProjectModalOpen(open) {
    modal.style.display = open ? "flex" : "none";
    document.body.style.overflow = open ? "hidden" : "";

  }


  // 🔹 Load and show project data
  async function openProjectModal(projectId) {
    try {
      const db = window.firestoreDb;
      const projectRef = window.fsDoc(db, "projects", projectId);
      const projectSnap = await window.fsGetDoc(projectRef);

      if (!projectSnap.exists()) {
        alert("Project not found.");
        return;
      }

      const project = projectSnap.data();

      titleEl.textContent = project.title || "Untitled Project";
      //excerptEl.textContent = project.excerpt || "";

      // Tags under the title in the project page (modal)
      const tagsEl = document.getElementById("modal-project-tags");
      const tags = Array.isArray(project.tags) ? project.tags : [];
      tagsEl.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");
      tagsEl.style.display = tags.length ? "flex" : "none";

      //imageEl.src = project.previewImage || "";
      //imageEl.style.display = project.previewImage ? "block" : "none";
      // Larger display + click-to-zoom only for real preview images.
      //imageEl.classList.toggle("has-custom-image", !!project.previewImage);
      //imageEl.classList.toggle("project-img-zoom", !!project.previewImage);

      // Remember which project is open (used by the Edit button)
      modal.dataset.projectId = projectId;

      // Show the modal immediately so a phase/permission error can't hide it
      phasesContainer.innerHTML = "<p>Loading phases...</p>";
      setProjectModalOpen(true);

      // Show the Edit button only for editors
      editBtn.style.display = "none";
      isCurrentUserEditor().then((ok) => {
        editBtn.style.display = ok ? "inline-block" : "none";
      });

      // 🔹 Load phases (failure here must NOT prevent the modal from showing)
      try {
        const phasesRef = window.fsCollection(projectRef, "phases");
        const phaseSnaps = await window.fsGetDocs(phasesRef);

        if (phaseSnaps.empty) {
          phasesContainer.innerHTML = "<p><em>No phases available.</em></p>";
        } else {
          // Order phases by their explicit `order` field. For older projects
          // that don't have one yet, flip the arbitrary default order so it
          // matches the editor's display.
          let phases = phaseSnaps.docs.map((d) => ({ id: d.id, ...d.data() }));
          const anyHasOrder = phases.some((p) => typeof p.order === "number");
          if (anyHasOrder) {
            phases.sort((a, b) =>
              (typeof a.order === "number" ? a.order : 1e9) -
              (typeof b.order === "number" ? b.order : 1e9)
            );
          } else {
            phases.reverse();
          }

          phasesContainer.innerHTML = "";
          phases.forEach((phase) => {
            const div = document.createElement("div");
            div.className = "project-phase";

            // Phase attachments render below the title, above the body.
            const atts = Array.isArray(phase.attachments) ? phase.attachments : [];
            const attHtml = atts.length ? `
              <div class="phase-attachments">
                <span class="attachments-label">Attachments:</span>
                ${atts.map(a => `<span class="attachment-item"><a href="${a.url}" target="_blank" rel="noopener">📎 ${a.name}</a></span>`).join("")}
              </div>` : "";

            div.innerHTML = `
              <h3>${phase.title || "Untitled Phase"}</h3>
              ${attHtml}
              <div>${phase.content || ""}</div>
            `;
            phasesContainer.appendChild(div);
          });
        }
      } catch (phaseErr) {
        console.error("Error loading phases:", phaseErr);
        phasesContainer.innerHTML = "<p><em>Couldn't load phases: " + (phaseErr.code || phaseErr.message || phaseErr) + "</em></p>";
      }
    } catch (err) {
      console.error("Error opening project:", err);
      alert("Couldn't open project: " + (err.code || err.message || err));
    }
  }
});
</script>

<!-- 🔹 Fullscreen image lightbox (click any project image to enlarge) -->
<div id="image-lightbox" class="image-lightbox">
  <img id="image-lightbox-img" src="" alt="">
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const lightbox = document.getElementById("image-lightbox");
    const lightboxImg = document.getElementById("image-lightbox-img");

    // Open when any zoomable project image is clicked (works for dynamically
    // loaded cards and the modal image via event delegation).
    document.body.addEventListener("click", (e) => {
      const img = e.target.closest(".project-img-zoom");
      if (!img || !img.src) return;
      lightboxImg.src = img.src;
      lightbox.classList.add("active");
    });

    // Close on click anywhere in the overlay.
    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("active");
      lightboxImg.src = "";
    });

    // Close on Escape.
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        lightbox.classList.remove("active");
        lightboxImg.src = "";
      }
    });
  });
</script>
