<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vapor Main</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css?v=1">
    <link rel="stylesheet" href="styles-tablet.css">
    <link rel="stylesheet" href="styles-phone.css">
    <link rel="stylesheet" href="s-posting.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External Libraries for Editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    
    <!-- Firebase -->
    <script type="module" src="j-firebase.js"></script>
    
    <!-- Core Scripts -->
    <script src="j-modules.js"></script>
    <script src="spa-router.js"></script>
    
    <!-- Function Scripts -->
    <script type="module" src="functions/login.js"></script>
    <script type="module" src="functions/logout.js"></script>
    <script type="module" src="functions/profile-edit.js"></script>
</head>
<body>
    <!-- Persistent Account Bar -->
    <div id="account-bar"></div>
    
    <!-- Dynamic Content Container -->
    <div id="app-container">
        <!-- Hero Section (changes based on route) -->
        <div id="hero-section"></div>
        
        <!-- Main Content Area -->
        <div id="main-content"></div>
        
        <!-- Navigation (changes based on route) -->
        <div id="navigation"></div>
    </div>
    
    <!-- Hidden file input for image uploads (used by editor) -->
    <input type="file" id="imageUpload" accept="image/*" style="display: none;" multiple>
    
    <!-- Initialize SPA -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Initialize the SPA router
            window.spaRouter = new SPARouter();
            
            // Load the account bar (persistent across all views)
            await ModuleLoader.loadModule('modules/account-bar.html', '#account-bar', window.updateAccountBar);
            
            // Start the router
            window.spaRouter.init();
        });
    </script>
</body>
</html>
